<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Vault Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================= THEME CONFIGURATION ================= */
        :root {
            --bg-main: #0A0F24;          /* Deep Synth Navy */
            --bg-card: #111115;          /* Slightly lighter card background */
            --neon-pink: #F15BB5;        /* Glowing Flamingo Pink */
            --neon-turquoise: #00F5D4;  /* Electric Turquoise */
            --text-white: #FFFFFF;
            --text-muted: #6272A4;       /* Subtle gray-blue */
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                linear-gradient(rgba(10, 15, 36, 0.95), rgba(10, 15, 36, 0.95)),
                url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1000&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
            color: var(--text-white);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            justify-content: center;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: var(--neon-pink);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(241, 91, 181, 0.5);
            letter-spacing: 2px;
        }
        .header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.1rem;
        }

        .portal-selection-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Making entire card clickable nicely */
        .portal-link {
            text-decoration: none;
            color: inherit;
            outline: none;
        }

        .portal-card {
            background-color: rgba(20, 23, 46, 0.85);
            border: 2px solid rgba(98, 114, 164, 0.3);
            border-radius: 15px;
            width: 280px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .portal-card i {
            font-size: 4.5rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .portal-card h2 {
            margin: 10px 0;
            font-size: 1.6rem;
            color: #fff;
        }
        .portal-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ===== HOVER TRANSITIONS ===== */
        
        /* Linux Card Hover: Turquoise Glow */
        .portal-link:hover .linux-card {
            border-color: var(--neon-turquoise);
            box-shadow: 0 0 30px rgba(0, 245, 212, 0.4);
            transform: translateY(-8px);
        }
        .portal-link:hover .linux-card i {
            color: var(--neon-turquoise);
            text-shadow: 0 0 15px rgba(0, 245, 212, 0.6);
        }
        
        /* Python Card Hover: Pink Glow */
        .portal-link:hover .python-card {
            border-color: var(--neon-pink);
            box-shadow: 0 0 30px rgba(241, 91, 181, 0.4);
            transform: translateY(-8px);
        }
        .portal-link:hover .python-card i {
            color: var(--neon-pink);
            text-shadow: 0 0 15px rgba(241, 91, 181, 0.6);
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>TERMINAL VAULT CONTROL</h1>
        <p>// Select a portal to access core databases</p>
    </div>
    
    <div class="portal-selection-screen">
        
        <a href="linux.html" class="portal-link">
            <div class="portal-card linux-card">
                <i class="fas fa-dragon"></i>
                <h2>KALI_LINUX_OS</h2>
                <p>System Terminal Core <br> Access Shell Functions</p>
            </div>
        </a>

        <a href="python.html" class="portal-link">
            <div class="portal-card python-card">
                <i class="fab fa-python"></i>
                <h2>PYTHON_CORE</h2>
                <p>Script Engine Database <br> Access Automation Codes</p>
            </div>
        </a>

    </div>

</body>
</html>
